name: coordinate
version: 1
description: "LLM-based coordinator that decomposes a task into dynamic agent steps"

inputs:
  description:
    type: string
    required: true

settings:
  max_steps: 20
  timeout_minutes: 120

steps:
  - id: plan
    agent: coordinator
    prompt_template: |
      Analyze and decompose the following task into an execution plan:

      {description}

      Read relevant files to understand the codebase context before planning.
      Output a JSON plan with the minimum number of agent steps needed.
      {language_instruction}
    timeout: 300
    guardrails:
      - frontmatter-valid:
          lenient_on_exit_0: true

  - id: execute
    type: dynamic
    prompt_template: "Execute coordinator plan"
    depends_on:
      - plan
