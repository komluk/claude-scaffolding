name: workflow
version: 1
description: "Standard development workflow with OpenSpec artifacts"

inputs:
  description:
    type: string
    required: true
  conversation_id:
    type: string
    required: false

settings:
  max_steps: 20
  timeout_minutes: 120

steps:
  - id: propose
    agent: analyst
    max_turns: 10
    timeout: 600
    prompt_template: |
      Interpret user intent, assess scope and feasibility, and write a proposal.
      Description: {description}
      Conversation ID: {conversation_id}
      Specs path: {specs_path}
      Write proposal.md to the specs path.
      {language_instruction}
    guardrails:
      - frontmatter-valid:
          lenient_on_exit_0: true

  - id: research
    agent: researcher
    max_turns: 15
    timeout: 600
    condition: "steps.propose.needs_research == True"
    prompt_template: |
      Research external APIs, libraries, and best practices needed for the proposal.
      Original user request: {original_prompt}
      Read the proposal at: {specs_path}proposal.md
      Write your ResearchPack findings.
      {language_instruction}
    guardrails:
      - frontmatter-valid:
          lenient_on_exit_0: true
    on_failure:
      goto: design
      max_loops: 1

  - id: design
    agent: architect
    max_turns: 15
    timeout: 900
    depends_on: [propose, research]
    prompt_template: |
      Read proposal.md and research findings.
      Original user request: {original_prompt}

      Write design.md and tasks.md to: {specs_path}
      Include architecture decisions, file changes, and implementation tasks.

      Then decompose the tasks into atomic issues with a dependency graph.
      For each implementation task, output a DEVELOPER+REVIEWER PAIR:
      - IMPL-XXX with agent "developer" — does the implementation
      - REVIEW-XXX with agent "reviewer" and depends_on ["IMPL-XXX"] — reviews that specific change

      Independent IMPL issues (no file overlap) should have NO cross-dependencies
      so they run in parallel. Each REVIEW depends only on its paired IMPL.

      Output a structured plan as a JSON block:

      <!-- @data
      {
        "issues": [
          {
            "id": "IMPL-001",
            "title": "Implement feature A",
            "description": "...",
            "agent": "developer",
            "depends_on": [],
            "files": ["path/to/file.py"],
            "acceptance_criteria": ["criterion 1"]
          },
          {
            "id": "REVIEW-001",
            "title": "Review IMPL-001",
            "description": "Review changes from IMPL-001 for code quality, security, and correctness.",
            "agent": "reviewer",
            "depends_on": ["IMPL-001"],
            "files": [],
            "acceptance_criteria": ["Code quality verified", "No security issues"]
          }
        ]
      }
      -->
      {language_instruction}
    output_schema:
      type: object
      required: [issues]
      properties:
        issues:
          type: array
          items:
            type: object
            required: [id, title, description]
    guardrails:
      - frontmatter-valid:
          lenient_on_exit_0: true
      - json-schema:
          lenient_on_exit_0: true

  - id: implement
    type: dynamic
    depends_on: [design]

  - id: review
    agent: reviewer
    max_turns: 15
    timeout: 900
    depends_on: [implement]
    prompt_template: |
      This is the INTEGRATION REVIEW step. Individual changes have already been
      reviewed by per-change reviewer agents in REVIEW-* steps.

      Your job is to review ALL changes TOGETHER for:
      - Cross-file consistency and integration correctness
      - Overall architecture alignment with: {specs_path}design.md
      - Merge conflicts or incompatible changes between parallel branches
      - End-to-end test coverage across the combined changeset
      Original user request: {original_prompt}
      {language_instruction}
    guardrails:
      - frontmatter-valid:
          lenient_on_exit_0: true
      - no-critical-issues: {}
    on_failure:
      goto: implement
      max_loops: 2

  - id: document
    agent: tech-writer
    max_turns: 15
    timeout: 600
    depends_on: [review]
    prompt_template: |
      Update documentation and CHANGELOG for changes described in: {specs_path}design.md
      Original user request: {original_prompt}
      {language_instruction}

  - id: push
    agent: gitops
    max_turns: 10
    timeout: 300
    depends_on: [document]
    prompt_template: |
      Commit and push all changes to remote.
      Original user request: {original_prompt}
      After push, determine the appropriate branch finishing action:
      - If on main: push is sufficient, no further action needed
      - If on feature branch: offer merge, PR, keep, or discard based on context
      Verify push succeeded.
      {language_instruction}
